<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Run 🚀</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#030314; overflow:hidden; }
  #root { width:100vw; min-height:100vh; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>
<div id="loading" style="position:fixed;inset:0;background:#030314;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:monospace;">
  <div style="color:#00eaff;font-size:22px;letter-spacing:4px;margin-bottom:16px">SPACE RUN</div>
  <div style="color:#ffffff44;font-size:12px;letter-spacing:2px">LOADING...</div>
  <div style="margin-top:20px;width:200px;height:2px;background:#ffffff11;border-radius:2px;overflow:hidden">
    <div id="loadbar" style="height:100%;background:#00eaff;width:0%;transition:width 0.3s;border-radius:2px"></div>
  </div>
</div>
<div id="root"></div>
<script>
  // Animate loading bar
  let p = 0;
  const bar = document.getElementById('loadbar');
  const iv = setInterval(()=>{ p = Math.min(p+2,90); bar.style.width=p+'%'; },100);
  // Hide loading when React renders
  const observer = new MutationObserver(()=>{
    if(document.getElementById('root').children.length > 0){
      clearInterval(iv);
      bar.style.width='100%';
      setTimeout(()=>{ document.getElementById('loading').style.display='none'; },300);
      observer.disconnect();
    }
  });
  observer.observe(document.getElementById('root'), {childList:true,subtree:true});
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useEffect, useRef, useState } = React;

// ── Star Wars–style fanfare через Web Audio ──
function playStarWarsFanfare(ac) {
  if (!ac) return;
  ac.resume();
  const t = ac.currentTime;
  const master = ac.createGain(); master.gain.value = 0.28;
  master.connect(ac.destination);

  function n(freq, start, dur, type="square", vol=0.15) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.001, t+start);
    g.gain.linearRampToValueAtTime(vol, t+start+0.03);
    g.gain.setValueAtTime(vol, t+start+dur-0.04);
    g.gain.linearRampToValueAtTime(0.001, t+start+dur);
    o.connect(g); g.connect(master);
    o.start(t+start); o.stop(t+start+dur+0.05);
    o.onended = ()=>{ try{o.disconnect();g.disconnect();}catch(e){} };
  }

  // Главная тема — восходящий фанфарный мотив
  const mel = [
    [392,0,.18],[392,.2,.18],[392,.4,.18],[311.1,.6,.55],
    [466.2,1.15,.18],[392,1.35,.55],[311.1,1.92,.18],[466.2,2.12,.18],[392,2.32,.9],
    [587.3,3.3,.18],[587.3,3.5,.18],[587.3,3.7,.18],[622.3,3.9,.55],
    [466.2,4.45,.18],[369.9,4.65,.55],[311.1,5.22,.18],[466.2,5.42,.18],[392,5.62,.9],
  ];
  mel.forEach(([f,s,d]) => n(f,s,d,"square",0.13));

  // Бас-линия
  const bass = [
    [98,0,.5],[117.5,.6,.5],[98,1.2,.5],[87.3,1.8,.5],
    [146.8,3.3,.5],[138.6,3.9,.5],[110,4.5,.5],[98,5.1,.8],
  ];
  bass.forEach(([f,s,d]) => n(f,s,d,"sine",0.22));

  // Контрмелодия
  const harm = [
    [493.9,.2,.15],[523.3,.4,.15],[493.9,.6,.4],
    [659.3,1.15,.15],[587.3,1.35,.4],
    [784,3.5,.15],[739.9,3.7,.15],[698.5,3.9,.4],
    [880,4.65,.15],[830.6,4.85,.4],
  ];
  harm.forEach(([f,s,d]) => n(f,s,d,"triangle",0.07));
}

function SpaceRunner() {
  const canvasRef = useRef(null);
  const gameRef = useRef({});
  const joystickRef = useRef({ active: false, startY: 0, currentY: 0, id: null });
  const stopMusicRef = useRef(null);
  const acRef = useRef(null);
  const [introPhase, setIntroPhase] = useState("prelude"); // prelude→logo→crawl→done
  const [ui, setUi] = useState({ score: 0, hi: 0, state: "idle", lives: 3, warpCooldown: 0, superReady: false });
  const [knobY, setKnobY] = useState(0);
  const [closed, setClosed] = useState(false);

  const introAudioRef = useRef(null);

  // Запускаем intro при монтировании
  useEffect(() => {
    const t1 = setTimeout(() => setIntroPhase("logo"),  3800);
    const t2 = setTimeout(() => setIntroPhase("crawl"), 6800);
    const t3 = setTimeout(() => setIntroPhase("done"),  20000);
    return () => {
      clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
    };
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;

    const g = {
      state: "idle", score: 0, hi: 0, frame: 0, speed: 3,
      ship: { x: 90, y: H / 2, vy: 0, r: 14 },
      asteroids: [], bullets: [], particles: [], thrustParticles: [],
      stars: Array.from({ length: 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2, speed: Math.random() * 1.5 + 0.3, a: Math.random(),
      })),
      nextAst: 80, raf: null, shakeFrames: 0, lastShot: 0, joystickY: 0,
      lives: 3, invFrames: 0,
      warpFrames: 0, warpCooldown: 0, warpSpeed: 0, warpStreams: [],
      hole: null, lastMilestone: 0, zone: 0, transitFrames: 0,
      comets: [], galaxy: { rot:0, x:520*0.72, y:200*0.28 }, solar: null, corona: null, terra: null,
      bonuses: [], nextBonus: 300,
      // новые фичи
      enemies: [], enemyBullets: [],         // враги-истребители
      shieldFrames: 0, shieldPickups: [],     // щит
      superCharge: 0, superReady: false,      // супервыстрел
      magnetFrames: 0,                        // магнит
      magnetPickups: [],                       // капсулы магнита
      lightnings: [],                          // электрические разряды
      eye: { t:0, blink:0, pupilY:0 },        // Туманность Глаз
      portal: null,                            // портал-радуга (вместо дыры)
      boss: null,                             // мини-босс
      achievements: [],                       // достижения
      signals: [], nextSignal: 800,           // перехваченные сигналы
      banner: null,                           // баннер достижений
      stats: { asteroidsKilled:0, warps:0, zonesVisited:0, bonusesPicked:0 },
      planets: [],
    };
    gameRef.current = g;

    const PT = [
      { color:"#4a8fa8", atmo:"#4a8fa844", bands:["#3a7a9444","#5aaac444"], hasRing:false, blur:0 },
      { color:"#c47a3a", atmo:"#c47a3a55", bands:["#a0602844","#e09a5044"], hasRing:true,  blur:0 },
      { color:"#7a5ab5", atmo:"#7a5ab566", bands:["#60409444","#9a70d044"], hasRing:false, blur:0 },
      { color:"#3a8a5a", atmo:"#3a8a5a44", bands:["#2a6a4044","#4aaa7044"], hasRing:false, blur:2 },
      { color:"#b54a4a", atmo:"#b54a4a44", bands:["#903030","#d06060"],     hasRing:true,  blur:0 },
      { color:"#6a6aaa", atmo:"#6a6aaa22", bands:[],                        hasRing:false, blur:8 },
    ];
    [
      { typeIdx:5, r:55, y:H*0.18, speed:0.12, alpha:0.35 },
      { typeIdx:0, r:38, y:H*0.75, speed:0.22, alpha:0.7  },
      { typeIdx:1, r:62, y:H*0.40, speed:0.15, alpha:0.85 },
      { typeIdx:2, r:28, y:H*0.85, speed:0.30, alpha:0.6  },
      { typeIdx:3, r:45, y:H*0.25, speed:0.18, alpha:0.75 },
      { typeIdx:4, r:80, y:H*0.55, speed:0.10, alpha:0.5  },
    ].forEach((c, i) => g.planets.push({ ...c, type: PT[c.typeIdx], x: W*0.4 + i*(W*0.55) }));

    // AUDIO
    const ACtx = window.AudioContext || window.webkitAudioContext;
    const ac = ACtx ? new ACtx() : null;
    const mn = { nodes: [], running: false };

    // MP3 треки с Cloudinary
    // Синтезированная музыка (Web Audio API)
    const mn = { nodes: [], running: false };

    let _audioEl = null;
    function playMP3(file, loop, vol) {
      if (_audioEl) { try{_audioEl.pause();}catch(e){} _audioEl = null; }
      mn.running = false; mn.nodes.forEach(n=>{try{n.stop();}catch(e){}});mn.nodes=[];
      const a = new Audio(file);
      a.loop = loop; a.volume = vol;
      a.play().catch(e => console.warn('audio:', e));
      _audioEl = a;
    }
        function stopMusic() {
      if (_audioEl) { try{_audioEl.pause();}catch(e){} _audioEl=null; }
      mn.running = false;
      mn.nodes.forEach(n => { try { n.stop(); } catch(e) {} });
      mn.nodes = [];
    }

    function resumeAC() { if (ac && ac.state === "suspended") ac.resume(); }

    function note(freq, start, dur, type, vol, dest) {
      if (!ac || !dest) return;
      const o = ac.createOscillator(), g2 = ac.createGain();
      o.type = type || "sine"; o.frequency.value = freq;
      g2.gain.setValueAtTime(0.001, start);
      g2.gain.linearRampToValueAtTime(vol||0.1, start+0.04);
      g2.gain.setValueAtTime(vol||0.1, start+dur-0.05);
      g2.gain.linearRampToValueAtTime(0.001, start+dur);
      o.connect(g2); g2.connect(dest);
      o.start(start); o.stop(start+dur+0.02);
      mn.nodes.push(o);
    }

    function makeMaster(vol) {
      if (!ac) return null;
      const m = ac.createGain(); m.gain.value = vol||0.28;
      const dry = ac.createGain(); dry.gain.value = 0.9;
      m.connect(dry); dry.connect(ac.destination);
      return m;
    }

    function playIntroMusic() { playMP3('intro.mp3', false, 0.8); }


    function playGameMusic() { playMP3('gameplay.mp3', true, 0.7); }


    function playGameOverMusic() { playMP3('gameover.mp3', false, 0.75); }


        stopMusicRef.current = stopMusic;
    gameRef.current.resumeAC = resumeAC;
    gameRef.current.playIntro = () => { resumeAC(); playIntroMusic(); };
    gameRef.current.stopIntroMusic = () => stopMusic();

    // makeMaster и note оставляем для звуковых эффектов
    function makeMaster(vol) {
      if (!ac) return { connect: ()=>{} };
      const m = ac.createGain(); m.gain.value = vol || 0.28;
      const d = ac.createDelay(0.4); d.delayTime.value = 0.32;
      const fb = ac.createGain(); fb.gain.value = 0.22;
      const dry = ac.createGain(); dry.gain.value = 0.82;
      const wet = ac.createGain(); wet.gain.value = 0.18;
      m.connect(dry); dry.connect(ac.destination);
      m.connect(d); d.connect(fb); fb.connect(d); d.connect(wet); wet.connect(ac.destination);
      return m;
    }

    function note(freq, start, dur, type, vol, dest) {
      if (!ac || !dest || !dest.connect) return;
      const o = ac.createOscillator(), g2 = ac.createGain();
      o.type = type || "sine"; o.frequency.value = freq;
      g2.gain.setValueAtTime(0.001, start);
      g2.gain.linearRampToValueAtTime(vol || 0.1, start + 0.04);
      g2.gain.setValueAtTime(vol || 0.1, start + dur - 0.05);
      g2.gain.linearRampToValueAtTime(0.001, start + dur);
      o.connect(g2); g2.connect(dest);
      o.start(start); o.stop(start + dur + 0.02);
      mn.nodes.push(o);
    }

    function playWarp() {
      oneShot(() => {
        const t = ac.currentTime;
        const o1=ac.createOscillator(), g1=ac.createGain();
        o1.type="sawtooth";
        o1.frequency.setValueAtTime(80,t); o1.frequency.exponentialRampToValueAtTime(1800,t+0.5); o1.frequency.exponentialRampToValueAtTime(400,t+1.4);
        g1.gain.setValueAtTime(0,t); g1.gain.linearRampToValueAtTime(0.22,t+0.3); g1.gain.exponentialRampToValueAtTime(0.001,t+1.5);
        o1.connect(g1); g1.connect(ac.destination); o1.start(t); o1.stop(t+1.5);
        o1.onended=()=>{try{o1.disconnect();g1.disconnect();}catch(e){}};
        const o2=ac.createOscillator(), g2=ac.createGain();
        o2.type="sine";
        o2.frequency.setValueAtTime(200,t+0.1); o2.frequency.exponentialRampToValueAtTime(2000,t+0.6); o2.frequency.exponentialRampToValueAtTime(800,t+1.4);
        g2.gain.setValueAtTime(0,t+0.1); g2.gain.linearRampToValueAtTime(0.12,t+0.4); g2.gain.exponentialRampToValueAtTime(0.001,t+1.5);
        o2.connect(g2); g2.connect(ac.destination); o2.start(t+0.1); o2.stop(t+1.5);
        o2.onended=()=>{try{o2.disconnect();g2.disconnect();}catch(e){}};
      });
    }

    // Безопасный helper — нода сама отсоединяется после остановки
    function oneShot(fn) {
      if (!ac) return;
      try { fn(); } catch(e) {}
    }

    function playShot() {
      oneShot(() => {
        const t=ac.currentTime;
        const o=ac.createOscillator(), g2=ac.createGain();
        o.type="sawtooth";
        o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(120,t+0.12);
        g2.gain.setValueAtTime(0.15,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.13);
        o.connect(g2); g2.connect(ac.destination);
        o.start(t); o.stop(t+0.14);
        o.onended = () => { try{o.disconnect();g2.disconnect();}catch(e){} };
      });
    }

    function playExplosion(large) {
      oneShot(() => {
        const t=ac.currentTime, dur=large?0.5:0.28;
        const o=ac.createOscillator(), g2=ac.createGain();
        o.type="sine";
        o.frequency.setValueAtTime(large?80:130,t); o.frequency.exponentialRampToValueAtTime(25,t+dur);
        g2.gain.setValueAtTime(large?0.4:0.22,t); g2.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.connect(g2); g2.connect(ac.destination);
        o.start(t); o.stop(t+dur);
        o.onended = () => { try{o.disconnect();g2.disconnect();}catch(e){} };
      });
    }

    function playHit() {
      oneShot(() => {
        const t=ac.currentTime;
        const o=ac.createOscillator(), g2=ac.createGain();
        o.type="square"; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(50,t+0.15);
        g2.gain.setValueAtTime(0.2,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.16);
        o.connect(g2); g2.connect(ac.destination);
        o.start(t); o.stop(t+0.17);
        o.onended = () => { try{o.disconnect();g2.disconnect();}catch(e){} };
      });
    }

    function playDead() {
      oneShot(() => {
        const t=ac.currentTime;
        [200,267,320].forEach((f,i) => {
          const o=ac.createOscillator(), g2=ac.createGain();
          o.type="sawtooth"; o.frequency.value=f;
          g2.gain.setValueAtTime(0.1,t+i*0.05); g2.gain.exponentialRampToValueAtTime(0.001,t+0.8);
          o.connect(g2); g2.connect(ac.destination);
          o.start(t+i*0.05); o.stop(t+0.85);
          o.onended = () => { try{o.disconnect();g2.disconnect();}catch(e){} };
        });
      });
    }

    // GAME FUNCTIONS
    function spawnAsteroid(x, y, r, ivx) {
      const ar = r != null ? r : 14 + Math.random()*24;
      const ax = x != null ? x : W + ar + 10;
      const ay = y != null ? y : ar + Math.random()*(H - ar*2);
      const vx = ivx != null ? ivx : -(g.speed + Math.random()*1.5);
      const vy = (Math.random()-.5)*1.2;
      const sides = 6 + Math.floor(Math.random()*4);
      const verts = Array.from({length:sides}, (_,i) => ({ a:(i/sides)*Math.PI*2, d:ar*(0.68+Math.random()*0.32) }));
      g.asteroids.push({ x:ax,y:ay,r:ar,vx,vy,rot:0,rotSpeed:(Math.random()-.5)*0.05,verts,hp:1 });
    }

    function activateWarp() {
      if (g.state !== "running" || g.warpCooldown > 0 || g.warpFrames > 0) return;
      g.warpFrames = 90; g.warpCooldown = 300;
      resumeAC(); playWarp();
      setUi(u => ({ ...u, warpCooldown: 300 }));
    }
    gameRef.current.activateWarp = activateWarp;

    function shoot() {
      if (g.state !== "running" || g.frame - g.lastShot < 12) return;
      g.lastShot = g.frame;
      resumeAC(); playShot();
      [0,-9,9].forEach(dy => {
        g.bullets.push({ x:g.ship.x+18, y:g.ship.y+dy, vx:14, life:1 });
        for (let i = 0; i < 4; i++) g.particles.push({ x:g.ship.x+20, y:g.ship.y+dy, vx:Math.random()*4+6, vy:(Math.random()-.5)*2.5, life:.55, color:"#ffe566", r:Math.random()*2+1, isShard:false });
      });
    }
    gameRef.current.shoot = shoot;

    // ZONES — 3 different space biomes
    const ZONES = [
      { bg:"#030314", name:"DEEP SPACE"    },
      { bg:"#080318", name:"NEBULA RIFT"   },
      { bg:"#010a08", name:"VOID GARDEN"   },
      { bg:"#04060f", name:"SOLAR SYSTEM"  },
      { bg:"#0a0400", name:"SOLAR CORONA"  },
      { bg:"#000d0a", name:"TERRA VISTA"   },
    ];

    function playPickup() {
      oneShot(() => {
        const t=ac.currentTime;
        [523,659,784,1047].forEach((f,i) => {
          const o=ac.createOscillator(), g2=ac.createGain();
          o.type="sine"; o.frequency.value=f;
          g2.gain.setValueAtTime(0,t+i*0.07); g2.gain.linearRampToValueAtTime(0.15,t+i*0.07+0.04); g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.2);
          o.connect(g2); g2.connect(ac.destination); o.start(t+i*0.07); o.stop(t+i*0.07+0.22);
          o.onended=()=>{try{o.disconnect();g2.disconnect();}catch(e){}};
        });
      });
    }

    function spawnBonus() {
      const y = 20 + Math.random()*(H-40);
      g.bonuses.push({ x:W+20, y, r:10, pulse:Math.random()*Math.PI*2, vx:-(1.5+Math.random()) });
    }

    function spawnMagnetPickup() {
      g.magnetPickups.push({ x:W+20, y:20+Math.random()*(H-40), r:10, pulse:0 });
    }

    function spawnLightning() {
      // лимит 3 разряда за раз, только первые 6 астероидов — O(n²) иначе тормозит
      let found = 0;
      const maxAst = Math.min(g.asteroids.length, 6);
      for (let i=0; i<maxAst && found<3; i++) {
        for (let j=i+1; j<maxAst && found<3; j++) {
          const a=g.asteroids[i], b=g.asteroids[j];
          const dx=a.x-b.x, dy=a.y-b.y;
          if (dx*dx+dy*dy < 120*120) {
            g.lightnings.push({ x1:a.x,y1:a.y,x2:b.x,y2:b.y, life:1, segs:5 });
            found++;
          }
        }
      }
    }

    // ВРАГИ
    function spawnEnemy() {
      const y = 20 + Math.random()*(H-40);
      g.enemies.push({
        x: W+30, y, vy:0, r:10, hp:2,
        shootCd: 60+Math.floor(Math.random()*60),
        phase: Math.random()*Math.PI*2,
        color:"#ff4466",
      });
    }

    function playEnemyShot() {
      oneShot(() => {
        const t=ac.currentTime;
        const o=ac.createOscillator(), g2=ac.createGain();
        o.type="sawtooth"; o.frequency.setValueAtTime(300,t); o.frequency.exponentialRampToValueAtTime(80,t+0.15);
        g2.gain.setValueAtTime(0.1,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.16);
        o.connect(g2); g2.connect(ac.destination); o.start(t); o.stop(t+0.17);
        o.onended=()=>{try{o.disconnect();g2.disconnect();}catch(e){}};
      });
    }

    // СУПЕРВЫСТРЕЛ
    function fireSuperShot() {
      if (!g.superReady || g.state!=="running") return;
      g.superReady=false; g.superCharge=0;
      for (let i=-4;i<=4;i++) g.bullets.push({x:g.ship.x+18, y:g.ship.y, vx:14, vy:i*1.2, life:1, super:true});
      for (let i=0;i<20;i++) {
        const ang=Math.random()*Math.PI*2, sp=Math.random()*5+2;
        g.particles.push({x:g.ship.x+20,y:g.ship.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:"#ffff00",r:Math.random()*3+1,isShard:false});
      }
      resumeAC();
      oneShot(() => {
        const t=ac.currentTime;
        [200,400,800].forEach((f,i)=>{
          const o=ac.createOscillator(), g2=ac.createGain();
          o.type="sawtooth"; o.frequency.setValueAtTime(f*2,t); o.frequency.exponentialRampToValueAtTime(f,t+0.3);
          g2.gain.setValueAtTime(0.15,t+i*0.05); g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
          o.connect(g2); g2.connect(ac.destination); o.start(t+i*0.05); o.stop(t+0.45);
          o.onended=()=>{try{o.disconnect();g2.disconnect();}catch(e){}};
        });
      });
      setUi(u=>({...u,superReady:false}));
    }
    gameRef.current.fireSuperShot = fireSuperShot;

    // БАННЕР ДОСТИЖЕНИЙ
    function showBanner(text, color) {
      g.banner = {text, color:color||"#ffe566", frames:180};
    }

    function checkAchievements() {
      const s=g.stats, done=g.achievements;
      const check=(id,cond,text,col)=>{
        if (cond&&!done.includes(id)){done.push(id);showBanner(text,col);}
      };
      check("ast50",   s.asteroidsKilled>=50,  "★ 50 АСТЕРОИДОВ!",    "#ffe566");
      check("ast100",  s.asteroidsKilled>=100,  "★ 100 АСТЕРОИДОВ!",   "#ffaa00");
      check("warp3",   s.warps>=3,              "★ МАСТЕР ВАРПА!",     "#00eaff");
      check("zones3",  s.zonesVisited>=3,       "★ ПУТЕШЕСТВЕННИК!",   "#b36aff");
      check("bonus5",  s.bonusesPicked>=5,      "★ ЖИВУЧИЙ!",          "#00ff88");
      check("score500",g.score>=500,            "★ 500 ОЧКОВ!",        "#ff6ef7");
    }

    // МИНИ-БОСС
    function spawnBoss() {
      g.boss = {
        x: W+60, y: H/2, r:30, hp:20, maxHp:20,
        vy:0, phase:0, shootCd:45,
        enraged: false,
        color:"#ff2244",
      };
      showBanner("⚠ БОСС ПОЯВИЛСЯ!", "#ff2244");

    // СИГНАЛЫ
    function spawnSignal() {
      const msgs=["SOS... coordinates lost...","ALIEN SIGNAL DETECTED","WARNING: GRAVITY ANOMALY","UNKNOWN VESSEL APPROACHING","DEEP SPACE TRANSMISSION"];
      g.signals.push({text: msgs[Math.floor(Math.random()*msgs.length)], frames:200, x:W-10});
    }

    function spawnComet() {
      const fromTop = Math.random()<0.5;
      const cx = fromTop ? Math.random()*W : -20;
      const cy = fromTop ? -20 : Math.random()*H;
      const angle = fromTop ? Math.PI/4 + Math.random()*0.4 : -Math.PI/6 + Math.random()*Math.PI/3;
      const spd = 4 + Math.random()*4;
      g.comets.push({ x:cx, y:cy, vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
        r: 2+Math.random()*2, color: Math.random()<0.5?"#aaddff":"#ffffaa", tail:[] });
    }

    function playBlackHoleAppear() {
      oneShot(() => {
        const t=ac.currentTime;
        const osc=ac.createOscillator(), g2=ac.createGain();
        osc.type="sine"; osc.frequency.setValueAtTime(60,t); osc.frequency.linearRampToValueAtTime(20,t+2);
        g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.25,t+0.3); g2.gain.linearRampToValueAtTime(0,t+2);
        osc.connect(g2); g2.connect(ac.destination); osc.start(t); osc.stop(t+2.1);
        osc.onended=()=>{try{osc.disconnect();g2.disconnect();}catch(e){}};
        const o2=ac.createOscillator(), g3=ac.createGain();
        o2.type="sawtooth"; o2.frequency.setValueAtTime(400,t); o2.frequency.exponentialRampToValueAtTime(2000,t+1.5);
        g3.gain.setValueAtTime(0,t); g3.gain.linearRampToValueAtTime(0.07,t+0.5); g3.gain.exponentialRampToValueAtTime(0.001,t+1.8);
        o2.connect(g3); g3.connect(ac.destination); o2.start(t); o2.stop(t+1.9);
        o2.onended=()=>{try{o2.disconnect();g3.disconnect();}catch(e){}};
      });
    }

    function playZoneTransition() {
      oneShot(() => {
        const t=ac.currentTime;
        [220,330,440].forEach((f,i) => {
          const o=ac.createOscillator(), g2=ac.createGain();
          o.type="triangle"; o.frequency.value=f;
          g2.gain.setValueAtTime(0,t+i*0.1); g2.gain.linearRampToValueAtTime(0.12,t+i*0.1+0.1); g2.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.7);
          o.connect(g2); g2.connect(ac.destination); o.start(t+i*0.1); o.stop(t+i*0.1+0.75);
          o.onended=()=>{try{o.disconnect();g2.disconnect();}catch(e){}};
        });
      });
    }

    function enterNewZone() {
      g.hole = null;
      g.portal = null;          // ВАЖНО: сбрасываем и портал и дыру
      g.lastMilestone = Math.floor(g.score/200); // prevent immediate re-spawn
      g.zone = (g.zone+1) % ZONES.length;
      g.transitFrames = 60;
      g.score += 100;
      g.galaxy = { rot:0, x:W*(0.5+Math.random()*0.4), y:H*(0.2+Math.random()*0.6) };
      g.planets.forEach((p,i) => { p.x = W*0.4 + i*(W*0.55); });
      g.asteroids = [];
      // Солнечная система — инициализируем при входе
      if (g.zone === 3) {
        g.solar = {
          sun: { x: W+120, y: H*0.5, r: 55, speed: 0.35 },
          planets: [
            { name:"Меркурий", r:4,  orbitR:90,  speed:0.022, ang:0.3,  color:"#aaaaaa", hasRing:false },
            { name:"Венера",   r:7,  orbitR:135, speed:0.015, ang:1.1,  color:"#e8b84b", hasRing:false },
            { name:"Земля",    r:8,  orbitR:185, speed:0.011, ang:2.2,  color:"#3a7bd5", hasRing:false, hasMoon:true },
            { name:"Марс",     r:5,  orbitR:240, speed:0.008, ang:3.5,  color:"#c1440e", hasRing:false },
            { name:"Юпитер",   r:20, orbitR:330, speed:0.004, ang:0.8,  color:"#c88b3a", hasRing:false, bands:["#a0622a","#e0a050"] },
            { name:"Сатурн",   r:16, orbitR:420, speed:0.003, ang:4.1,  color:"#e4d191", hasRing:true  },
            { name:"Уран",     r:11, orbitR:510, speed:0.002, ang:1.9,  color:"#7de8e8", hasRing:true  },
          ],
        };
        g.corona = null; g.terra = null;
      } else if (g.zone === 4) {
        // SOLAR CORONA — огромное Солнце с жалящими лучами
        g.solar = null; g.terra = null;
        g.corona = {
          x: W*0.72, y: H*0.5,
          r: 90,
          rays: Array.from({length:16}, (_,i) => ({
            ang: (i/16)*Math.PI*2 + Math.random()*0.2,
            len: 55 + Math.random()*45,
            width: 4 + Math.random()*6,
            speed: (Math.random()-.5)*0.012,
            phase: Math.random()*Math.PI*2,
          })),
          flares: [],
          nextFlare: 40,
          pulseT: 0,
        };
      } else if (g.zone === 5) {
        // TERRA VISTA — Земля крупным планом, вдали Солнце
        g.solar = null; g.corona = null;
        g.terra = {
          earth: { x: W*0.65, y: H*0.5, r: 72, rot: 0 },
          moon:  { ang: 0.8, orbitR: 110, r: 18, rot: 0 },
          sun:   { x: W*0.12, y: H*0.22, r: 28 },
          clouds: Array.from({length:8}, (_,i) => ({
            ang: (i/8)*Math.PI*2 + Math.random()*0.4,
            lat: (Math.random()-.5)*0.7,
            size: 8+Math.random()*14,
            speed: 0.002+Math.random()*0.002,
          })),
        };
      } else {
        g.solar = null; g.corona = null; g.terra = null;
      }
      resumeAC(); playZoneTransition();
      setUi(u => ({...u, score:g.score}));
    }

    function startGame() {
      if (g.state === "running") return;
      Object.assign(g, { state:"running",score:0,frame:0,speed:3,asteroids:[],bullets:[],particles:[],thrustParticles:[],nextAst:80,shakeFrames:0,lastShot:0,joystickY:0,lives:3,invFrames:0,warpFrames:0,warpCooldown:0,warpSpeed:0,warpStreams:[],
        hole:null, lastMilestone:0, zone:0, transitFrames:0, comets:[], galaxy:{rot:0, x:W*0.75, y:H*0.25}, solar:null, corona:null, terra:null, bonuses:[], nextBonus:300,
        enemies:[], enemyBullets:[], shieldFrames:0, shieldPickups:[], superCharge:0, superReady:false, magnetFrames:0, magnetPickups:[], lightnings:[], eye:{t:0,blink:0,pupilY:0}, portal:null, boss:null, achievements:[], signals:[], nextSignal:800, banner:null, stats:{asteroidsKilled:0,warps:0,zonesVisited:0,bonusesPicked:0} });
      g.planets.forEach((p,i) => { p.x = W*0.4 + i*(W*0.55); });
      g.ship.y = H/2; g.ship.vy = 0;
      setUi(u => ({ ...u, state:"running", score:0, lives:3, warpCooldown:0 }));
      resumeAC(); playGameMusic();
    }
    gameRef.current.startGame = startGame;

    function explodeAst(a, fromBullet) {
      g.shakeFrames = fromBullet ? 5 : 18;
      resumeAC(); playExplosion(a.r > 22);
      for (let i = 0; i < 3+Math.floor(Math.random()*3); i++) {
        const ang = (i/(3+Math.floor(Math.random()*3)))*Math.PI*2 + Math.random()*.5;
        const sp = 1.5 + Math.random()*3;
        g.particles.push({ x:a.x,y:a.y,vx:Math.cos(ang)*sp+a.vx*.5,vy:Math.sin(ang)*sp+a.vy*.5,life:1,color:"#b36aff",r:a.r*(.18+Math.random()*.22),isShard:true,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-.5)*.15,sides:4+Math.floor(Math.random()*3) });
      }
      for (let j = 0; j < 28; j++) {
        const ang = Math.random()*Math.PI*2, sp = Math.random()*5+1;
        g.particles.push({ x:a.x,y:a.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:j%3===0?"#ff6ef7":j%3===1?"#b36aff":"#ffe566",r:Math.random()*3+1,isShard:false });
      }
      g.particles.push({ x:a.x,y:a.y,isRing:true,r:4,maxR:a.r*2.8,life:1,color:"#b36aff" });
      if (a.r > 22 && fromBullet) {
        for (let k = 0; k < 2; k++) {
          const ang = Math.random()*Math.PI*2;
          spawnAsteroid(a.x+Math.cos(ang)*a.r*.5, a.y+Math.sin(ang)*a.r*.5, a.r*.48, a.vx-g.speed*.3);
        }
      }
    }

    function hitShip(a) {
      const dx=g.ship.x-a.x, dy=g.ship.y-a.y;
      return Math.sqrt(dx*dx+dy*dy) < g.ship.r*.8+a.r*.68;
    }

    function update() {
      if (g.state !== "running") return;
      g.frame++; g.score = Math.floor(g.frame/7); g.speed = 3 + g.score/450;
      const ship = g.ship, jy = g.joystickY;
      ship.vy += (jy*4.5 - ship.vy) * 0.08;
      for (const a of g.asteroids) {
        if (a.r < 20) continue;
        const dx=a.x-ship.x, dy=a.y-ship.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<140&&dist>1) ship.vy += (dy/dist)*.018*(1-dist/140)*(a.r/35);
      }
      ship.y = Math.max(ship.r+2, Math.min(H-ship.r-2, ship.y + ship.vy));

      if (Math.abs(jy)>.05) {
        for (let i=0;i<2;i++) g.thrustParticles.push({x:ship.x-14,y:ship.y+(Math.random()-.5)*8,vx:-Math.random()*2-.5,vy:(Math.random()-.5)*1.5+jy*1.5,life:1,color:Math.random()<.5?"#00eaff":"#ff6ef7"});
      } else if (Math.random()<.3) {
        g.thrustParticles.push({x:ship.x-14,y:ship.y+(Math.random()-.5)*5,vx:-Math.random()*1.5-.5,vy:(Math.random()-.5)*.5,life:.5,color:"#00eaff44"});
      }

      if (g.warpCooldown>0) g.warpCooldown--;
      if (g.transitFrames>0) g.transitFrames--;
      if (g.warpFrames>0) {
        g.warpFrames--;
        g.warpSpeed = Math.sin((1-g.warpFrames/90)*Math.PI);
        if (Math.random()<.7) g.warpStreams.push({x:W,y:Math.random()*H,len:30+Math.random()*120,speed:20+Math.random()*30,vy:(Math.random()-.5)*.5,color:Math.random()<.5?"#00eaff":Math.random()<.5?"#ffffff":"#ff6ef7",alpha:.4+Math.random()*.5});
      } else { g.warpSpeed*=.85; if(g.warpSpeed<.01)g.warpSpeed=0; }
      if (g.frame%25===0) setUi(u => ({...u, score:g.score, warpCooldown:g.warpCooldown}));

      const wm=1+g.warpSpeed*18, pm=1+g.warpSpeed*22;
      g.stars.forEach(s => { s.x-=s.speed*(g.speed/3)*wm; if(s.x<0){s.x=W;s.y=Math.random()*H;} });
      g.planets.forEach(p => { p.x-=p.speed*pm; if(p.x+p.r*2.5<0) p.x=W+p.r*2.5+Math.random()*W*.3; });
      g.warpStreams.forEach(s => { s.x-=s.speed*(1+g.warpSpeed*3); s.y+=s.vy; });
      g.warpStreams = g.warpStreams.filter(s => s.x+s.len>0);

      g.nextAst--; g.asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;a.rot+=a.rotSpeed;});
      if (g.nextAst<=0) { spawnAsteroid(); g.nextAst=100+Math.floor(Math.random()*120)-Math.min(g.score/40,40); }

      // black hole & zone portal
      if (g.hole) {
        const h = g.hole;
        h.rot += 0.018;
        h.pulseT += 0.05;
        // pull ship slightly toward hole vertically
        const dx=h.x-ship.x, dy=h.y-ship.y, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<h.r*5&&dist>1) { const f=0.022*(1-dist/(h.r*5)); ship.vy+=(dy/dist)*f; }
        // entry check: ship passes through hole column (X range) AND close vertically
        const inColumn = Math.abs(ship.x - h.x) < h.r*1.8;
        const inRow    = Math.abs(ship.y - h.y) < h.r*1.4;
        if (inColumn && inRow) {
          h.entering = true;
          h.enterFrame = (h.enterFrame||0)+1;
          if (h.enterFrame > 20) {
            g.hole = null; g.portal = null;
            setTimeout(()=>enterNewZone(), 0);
          }
        } else {
          h.enterFrame = Math.max(0,(h.enterFrame||0)-1);
          if (h.enterFrame===0) h.entering=false;
        }
        // hole scrolls at same speed as background
        h.x -= g.speed * 0.8;
        if (h.x < -h.r*3) g.hole = null;
      }

      // spawn hole every 200 pts
      const milestone = Math.floor(g.score/200);
      if (!g.hole && milestone > (g.lastMilestone||0) && g.score>0) {
        g.lastMilestone = milestone;
        g.hole = { x:W+60, y:H/2+(Math.random()-.5)*H*0.35, r:30, rot:0, pulseT:0, entering:false, enterFrame:0 };
        playBlackHoleAppear();
      }

      // comets
      g.comets.forEach(c=>{ c.x+=c.vx; c.y+=c.vy; c.tail.unshift({x:c.x,y:c.y}); if(c.tail.length>30)c.tail.pop(); });
      g.comets=g.comets.filter(c=>c.x>-50&&c.x<W+50&&c.y>-50&&c.y<H+50);
      if (Math.random()<0.003) spawnComet();

      // бонусы — капсулы жизни
      g.nextBonus--;
      if (g.nextBonus <= 0) {
        spawnBonus();
        g.nextBonus = 280 + Math.floor(Math.random()*200);
      }
      g.bonuses.forEach(b => { b.x += b.vx; b.pulse += 0.08; });
      g.bonuses = g.bonuses.filter(b => {
        if (b.x < -20) return false;
        const dx = b.x - g.ship.x, dy = b.y - g.ship.y;
        if (Math.sqrt(dx*dx+dy*dy) < b.r + g.ship.r) {
          // подобрали!
          if (g.lives < 3) {
            g.lives++;
            setUi(u => ({...u, lives:g.lives}));
          } else {
            g.score += 50; // уже полное здоровье — бонус очками
            setUi(u => ({...u, score:g.score}));
          }
          resumeAC(); playPickup();
          // фейерверк частиц
          for(let i=0;i<18;i++){
            const ang=Math.random()*Math.PI*2, sp=Math.random()*4+1;
            g.particles.push({x:b.x,y:b.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:i%2===0?"#00ff88":"#ffffff",r:Math.random()*3+1,isShard:false});
          }
          return false;
        }
        return true;
      });

      // galaxy rotation
      if (g.galaxy) g.galaxy.rot += 0.0008;

      // corona update
      if (g.corona) {
        const c = g.corona;
        c.pulseT += 0.04;
        c.rays.forEach(r => { r.ang += r.speed; r.phase += 0.03; });
        c.nextFlare--;
        if (c.nextFlare <= 0) {
          c.flares.push({ ang: Math.random()*Math.PI*2, t:1, len: 30+Math.random()*50, width: 3+Math.random()*5 });
          c.nextFlare = 25 + Math.floor(Math.random()*40);
        }
        c.flares.forEach(f => { f.t -= 0.025; });
        c.flares = c.flares.filter(f => f.t > 0);
      }

      // terra update
      if (g.terra) {
        g.terra.earth.rot += 0.003;
        g.terra.moon.ang  += 0.008;
        g.terra.moon.rot  += 0.01;
        g.terra.clouds.forEach(cl => { cl.ang += cl.speed; });
      }

      // solar system update
      if (g.solar) {
        const s = g.solar;
        s.sun.x -= s.sun.speed * (1 + g.warpSpeed * 22);
        s.planets.forEach(p => { p.ang += p.speed; });
        // убираем когда солнце ушло далеко влево
        if (s.sun.x < -s.sun.r*3 - 600) g.solar = null;
      }

      const hitA = new Set(), hitB = new Set();
      g.bullets.forEach((b,bi) => {
        g.asteroids.forEach((a,ai) => {
          if (hitA.has(ai)) return;
          const dx=b.x-a.x, dy=b.y-a.y;
          if (Math.sqrt(dx*dx+dy*dy)<4+a.r*.75) {
            hitB.add(bi); a.hp--;
            if (a.hp<=0) { hitA.add(ai); explodeAst(a,true); g.score+=a.r>22?10:5; }
            else for(let p=0;p<8;p++) g.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:.5,color:"#ffe566",r:2,isShard:false});
          }
        });
      });

      if (g.invFrames>0) g.invFrames--;
      for (let i=0;i<g.asteroids.length;i++) {
        if (hitA.has(i)||g.invFrames>0||g.warpFrames>0||g.warpSpeed>0.15) continue;
        if (hitShip(g.asteroids[i])) {
          explodeAst(g.asteroids[i],false); g.asteroids.splice(i,1);
          g.lives--; g.shakeFrames=14; resumeAC();
          if (g.lives<=0) {
            playDead(); g.state="dead";
            const nh=Math.max(g.score,g.hi); g.hi=nh;
            setUi({score:g.score,hi:nh,state:"dead",lives:0,warpCooldown:0});
            playGameOverMusic();
          } else {
            playHit(); g.invFrames=180;
            for(let p=0;p<20;p++){const ang=Math.random()*Math.PI*2,sp=Math.random()*4+1;g.particles.push({x:ship.x,y:ship.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:"#ff6ef7",r:Math.random()*3+1,isShard:false});}
            setUi(u => ({...u, lives:g.lives}));
          }
          return;
        }
      }

      g.asteroids = g.asteroids.filter((_,i) => !hitA.has(i)).filter(a => a.x+a.r>0);
      g.bullets = g.bullets.filter((_,i) => !hitB.has(i)).filter(b => b.x<W+20);
      g.bullets.forEach(b => { b.x+=b.vx; });
      g.particles.forEach(p => {
        if(p.isRing){p.r+=(p.maxR-p.r)*.18;p.life-=.07;return;}
        p.x+=p.vx;p.y+=p.vy;p.vx*=.94;p.vy*=.94;p.life-=.033;
        if(p.isShard)p.rot+=p.rotSpeed;
      });
      g.particles=g.particles.filter(p=>p.life>0);
      if (g.particles.length > 300) g.particles = g.particles.slice(-200); // лимит частиц
      g.thrustParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.08;});
      g.thrustParticles=g.thrustParticles.filter(p=>p.life>0);

      // ВРАГИ
      if (g.frame%400===0 && g.score>150) spawnEnemy();
      g.enemies.forEach(e=>{
        e.x -= g.speed*0.7 + 0.5;
        e.phase+=0.04;
        e.y += Math.sin(e.phase)*0.8; // синусоидальное движение
        e.shootCd--;
        if (e.shootCd<=0) {
          e.shootCd=50+Math.floor(Math.random()*50);
          const dx=g.ship.x-e.x, dy=g.ship.y-e.y, dist=Math.sqrt(dx*dx+dy*dy);
          if (dist>0) g.enemyBullets.push({x:e.x,y:e.y,vx:dx/dist*7,vy:dy/dist*7,life:1});
          resumeAC(); playEnemyShot();
        }
      });
      // вражеские пули vs корабль
      if (g.invFrames<=0 && g.shieldFrames<=0) {
        g.enemyBullets.forEach((b,bi)=>{
          const dx=b.x-g.ship.x, dy=b.y-g.ship.y;
          if (Math.sqrt(dx*dx+dy*dy)<g.ship.r+4) {
            b.life=0; g.lives--; g.shakeFrames=12; g.invFrames=120;
            resumeAC(); if(g.lives<=0){playDead();g.state="dead";const nh=Math.max(g.score,g.hi);g.hi=nh;setUi({score:g.score,hi:nh,state:"dead",lives:0,warpCooldown:0,superReady:false});}
            else{playHit();setUi(u=>({...u,lives:g.lives}));}
          }
        });
      } else if (g.shieldFrames>0) {
        g.enemyBullets.forEach(b=>{
          const dx=b.x-g.ship.x, dy=b.y-g.ship.y;
          if (Math.sqrt(dx*dx+dy*dy)<g.ship.r+20) { b.life=0; for(let i=0;i<8;i++)g.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:.6,color:"#00eaff",r:2,isShard:false}); }
        });
      }
      // наши пули vs враги
      g.bullets.forEach((b,bi)=>{
        g.enemies.forEach((e,ei)=>{
          if (e.hp<=0) return;
          const dx=b.x-e.x,dy=b.y-e.y;
          if (Math.sqrt(dx*dx+dy*dy)<e.r+4){
            b.life=0; e.hp-=(b.super?3:1);
            if (e.hp<=0){
              g.score+=30; g.stats.asteroidsKilled++;
              for(let i=0;i<20;i++){const ang=Math.random()*Math.PI*2,sp=Math.random()*4+1;g.particles.push({x:e.x,y:e.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,color:"#ff4466",r:Math.random()*3+1,isShard:false});}
              e.hp=0;
            } else for(let i=0;i<5;i++)g.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:.4,color:"#ff8888",r:2,isShard:false});
          }
        });
      });
      g.enemies=g.enemies.filter(e=>e.hp>0&&e.x>-50);
      g.enemyBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life-=0.018;});
      g.enemyBullets=g.enemyBullets.filter(b=>b.life>0&&b.x>-10&&b.x<W+10);

      // ЩИТ
      if (g.shieldFrames>0) g.shieldFrames--;
      g.shieldPickups.forEach(p=>{p.x-=1.8;p.pulse=(p.pulse||0)+0.1;});
      g.shieldPickups=g.shieldPickups.filter(p=>{
        if (p.x<-20) return false;
        const dx=p.x-g.ship.x,dy=p.y-g.ship.y;
        if (Math.sqrt(dx*dx+dy*dy)<p.r+g.ship.r){
          g.shieldFrames=300; resumeAC(); playPickup();
          for(let i=0;i<15;i++)g.particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,color:"#00eaff",r:2,isShard:false});
          showBanner("🛡 ЩИТ АКТИВИРОВАН!", "#00eaff");
          return false;
        }
        return true;
      });
      if (g.frame%500===0&&g.score>100) g.shieldPickups.push({x:W+15,y:20+Math.random()*(H-40),r:10,pulse:0});

      // МАГНИТ-КАПСУЛЫ
      if (g.frame%450===0&&g.score>80) spawnMagnetPickup();
      g.magnetPickups.forEach(p=>{p.x-=1.6; p.pulse+=0.1;});
      g.magnetPickups=g.magnetPickups.filter(p=>{
        if(p.x<-20)return false;
        const dx=p.x-g.ship.x,dy=p.y-g.ship.y;
        if(Math.sqrt(dx*dx+dy*dy)<p.r+g.ship.r){
          g.magnetFrames=360; resumeAC(); playPickup();
          for(let i=0;i<15;i++)g.particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:1,color:"#ff88ff",r:2,isShard:false});
          showBanner("🧲 МАГНИТ АКТИВИРОВАН!","#ff88ff");
          return false;
        }
        return true;
      });

      // МАГНИТ — притягивает бонусы И щиты
      if (g.magnetFrames>0) {
        g.magnetFrames--;
        [...g.bonuses,...g.shieldPickups].forEach(b=>{const dx=g.ship.x-b.x,dy=g.ship.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist>5){b.x+=dx/dist*4;b.y+=dy/dist*4;}});
      }

      // ЭЛЕКТРИЧЕСКИЕ РАЗРЯДЫ между близкими астероидами
      if (g.frame%18===0) spawnLightning();
      g.lightnings.forEach(l=>l.life-=0.12);
      g.lightnings=g.lightnings.filter(l=>l.life>0);

      // ГЛАЗ ТУМАННОСТИ — всегда следит за кораблём
      g.eye.t+=0.015;
      g.eye.blink=Math.max(0,g.eye.blink-0.05);
      if (Math.random()<0.004) g.eye.blink=1; // моргание
      g.eye.pupilY += ((g.ship.y-H/2)/H*18 - g.eye.pupilY)*0.04;

      // СУПЕРВЫСТРЕЛ — заряжается от убийств
      if (!g.superReady) {
        g.superCharge=Math.min(100,g.superCharge+0.04);
        if (g.superCharge>=100){g.superReady=true;showBanner("⚡ СУПЕРВЫСТРЕЛ ГОТОВ!","#ffff00");setUi(u=>({...u,superReady:true}));}
      }

      // МИНИ-БОСС каждые 1000 очков
      if (!g.boss&&Math.floor(g.score/1000)>(g.lastBossMilestone||0)) {
        g.lastBossMilestone=(g.lastBossMilestone||0)+1;
        spawnBoss();
      }
      if (g.boss) {
        const b=g.boss;
        b.x-=g.speed*0.4; b.phase+=0.03;
        b.y+=Math.sin(b.phase)*1.2;
        b.y=Math.max(b.r+5,Math.min(H-b.r-5,b.y));
        if (b.hp<=b.maxHp/2&&!b.enraged){b.enraged=true;showBanner("⚠ БОСС РАЗЪЯРЁН!","#ff2244");}
        b.shootCd--;
        if (b.shootCd<=0){
          b.shootCd=b.enraged?25:45;
          const angles=b.enraged?[-0.3,0,0.3]:[-0.15,0.15];
          angles.forEach(a=>{const dx=g.ship.x-b.x,dy=g.ship.y-b.y,dist=Math.sqrt(dx*dx+dy*dy),vx=(dx/dist)*8,vy=(dy/dist)*8+Math.sin(a)*3;g.enemyBullets.push({x:b.x,y:b.y,vx,vy,life:1,boss:true});});
          resumeAC(); playEnemyShot();
        }
        // наши пули vs босс
        g.bullets.forEach(bullet=>{
          if (!g.boss) return;
          const dx=bullet.x-b.x,dy=bullet.y-b.y;
          if (Math.sqrt(dx*dx+dy*dy)<b.r){
            bullet.life=0; b.hp-=(bullet.super?5:1);
            if(b.hp<=0){
              g.score+=200; g.shakeFrames=25;
              for(let i=0;i<40;i++){const ang=Math.random()*Math.PI*2,sp=Math.random()*6+2;g.particles.push({x:b.x,y:b.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1.2,color:i%3===0?"#ff2244":i%3===1?"#ff8800":"#ffff00",r:Math.random()*4+2,isShard:false});}
              g.particles.push({x:b.x,y:b.y,isRing:true,r:5,maxR:b.r*4,life:1,color:"#ff4400"});
              g.boss=null; showBanner("★ БОСС УНИЧТОЖЕН! +200","#ffaa00");
              setUi(u=>({...u,score:g.score}));
            }
          }
        });
        if (g.boss&&g.boss.x<-80) g.boss=null;
      }

      // СИГНАЛЫ
      g.nextSignal--;
      if (g.nextSignal<=0){spawnSignal();g.nextSignal=600+Math.floor(Math.random()*400);}
      g.signals.forEach(s=>{s.frames--;s.x-=0.4;});
      g.signals=g.signals.filter(s=>s.frames>0);

      // БАННЕР
      if (g.banner){g.banner.frames--;if(g.banner.frames<=0)g.banner=null;}

      // ДОСТИЖЕНИЯ
      if (g.frame%60===0) checkAchievements();
    }

    // DRAW
    const glow = (col,blur) => { ctx.shadowColor=col; ctx.shadowBlur=blur||18; };
    const noGlow = () => { ctx.shadowBlur=0; };

    function lighten(hex,amt){const n=parseInt(hex.slice(1),16);return `rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&0xff)+amt)},${Math.min(255,(n&0xff)+amt)})`;}
    function darken(hex,amt){return lighten(hex,-amt);}

    // offscreen canvas для галактики — рисуем один раз, не каждый кадр
    const galaxyCanvas = document.createElement("canvas");
    galaxyCanvas.width = 180; galaxyCanvas.height = 180;
    let galaxyZone = -1; // перерисовываем при смене зоны

    function prerenderGalaxy(zone) {
      const gc = galaxyCanvas.getContext("2d");
      gc.clearRect(0,0,180,180);
      gc.save(); gc.translate(90,90);
      const cols = [["#88ccff","#aaddff"],["#ff88ff","#ffaaff"],["#88ffcc","#aaffdd"]];
      const [col1] = cols[zone||0];
      const arms=3, armLen=70, pts=60; // pts=60 вместо 180 — в 3 раза меньше
      for (let arm=0;arm<arms;arm++) {
        const baseAng=(arm/arms)*Math.PI*2;
        for (let j=0;j<pts;j++) {
          const t=j/pts, ang=baseAng+t*Math.PI*3.5;
          const r2=t*armLen;
          const px=Math.cos(ang)*r2, py=Math.sin(ang)*r2*0.45;
          gc.globalAlpha=Math.min(1,(1-t)*0.55);
          gc.fillStyle=col1;
          gc.beginPath(); gc.arc(px,py,(1-t)*2.4+0.4,0,Math.PI*2); gc.fill();
        }
      }
      // core
      gc.globalAlpha=1;
      const cg=gc.createRadialGradient(0,0,0,0,0,20);
      cg.addColorStop(0,"rgba(255,255,220,1)");
      cg.addColorStop(0.4,col1+"88"); cg.addColorStop(1,"transparent");
      gc.fillStyle=cg; gc.beginPath(); gc.arc(0,0,20,0,Math.PI*2); gc.fill();
      gc.globalAlpha=1; gc.restore();
    }
    prerenderGalaxy(0);

    function drawGalaxy() {
      if (!g.galaxy || g.zone === 3 || g.zone === 4 || g.zone === 5) return;
      const zone = g.zone||0;
      if (zone !== galaxyZone) { prerenderGalaxy(zone); galaxyZone=zone; }
      const {x,y,rot} = g.galaxy;
      ctx.save();
      ctx.translate(x,y); ctx.rotate(rot);
      ctx.globalAlpha=0.55;
      ctx.drawImage(galaxyCanvas,-90,-90,180,180);
      ctx.globalAlpha=1; ctx.restore();
    }

    function drawSolarSystem() {
      if (!g.solar) return;
      const { sun, planets } = g.solar;
      const sx = sun.x, sy = sun.y;

      // орбиты — тонкие эллипсы вокруг Солнца
      ctx.save();
      ctx.translate(sx, sy);
      planets.forEach(p => {
        ctx.globalAlpha = 0.12;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.orbitR, p.orbitR * 0.28, 0, 0, Math.PI*2);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;

      // Солнце
      const sunGrad = ctx.createRadialGradient(0,0,0, 0,0,sun.r);
      sunGrad.addColorStop(0,   "#ffffff");
      sunGrad.addColorStop(0.2, "#fff7aa");
      sunGrad.addColorStop(0.6, "#ffaa00");
      sunGrad.addColorStop(1,   "#ff5500");
      ctx.fillStyle = sunGrad;
      ctx.shadowColor = "#ffaa00"; ctx.shadowBlur = 60;
      ctx.beginPath(); ctx.arc(0, 0, sun.r, 0, Math.PI*2); ctx.fill();

      // ореол Солнца
      const halo = ctx.createRadialGradient(0,0,sun.r*0.8, 0,0,sun.r*2.2);
      halo.addColorStop(0, "rgba(255,180,0,0.25)");
      halo.addColorStop(1, "transparent");
      ctx.fillStyle = halo;
      ctx.beginPath(); ctx.arc(0, 0, sun.r*2.2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;

      // планеты
      planets.forEach(p => {
        // позиция по эллиптической орбите (перспектива сверху-сбоку)
        const px = Math.cos(p.ang) * p.orbitR;
        const py = Math.sin(p.ang) * p.orbitR * 0.28;

        // тень за орбитой (планеты перед Солнцем темнее)
        const inFront = Math.sin(p.ang) > 0;
        const brightness = inFront ? 1.0 : 0.6;

        // кольца (Сатурн, Уран) — рисуем ДО планеты если сзади
        if (p.hasRing && !inFront) {
          ctx.save(); ctx.translate(px, py); ctx.scale(1, 0.3);
          ctx.globalAlpha = 0.55 * brightness;
          ctx.strokeStyle = p.color + "bb"; ctx.lineWidth = p.r * 0.7;
          ctx.beginPath(); ctx.arc(0, 0, p.r * 1.9, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }

        // тело планеты
        ctx.save(); ctx.translate(px, py);
        const pg = ctx.createRadialGradient(-p.r*0.3,-p.r*0.3,0, 0,0,p.r);
        pg.addColorStop(0, lighten(p.color, 50));
        pg.addColorStop(0.5, p.color);
        pg.addColorStop(1, darken(p.color, 60));
        ctx.globalAlpha = brightness;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();

        // полосы Юпитера
        if (p.bands) {
          ctx.save(); ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.clip();
          p.bands.forEach((bc,bi) => {
            ctx.fillStyle = bc + "88";
            ctx.fillRect(-p.r, -p.r*0.4 + bi*p.r*0.4, p.r*2, p.r*0.3);
          });
          ctx.restore();
        }

        // Луна у Земли
        if (p.hasMoon) {
          const moonAng = p.ang * 8;
          const mx = Math.cos(moonAng) * p.r * 2.2;
          const my = Math.sin(moonAng) * p.r * 0.7;
          ctx.fillStyle = "#cccccc"; ctx.shadowBlur = 3;
          ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI*2); ctx.fill();
        }

        ctx.shadowBlur = 0; ctx.restore();

        // кольца спереди
        if (p.hasRing && inFront) {
          ctx.save(); ctx.translate(px, py); ctx.scale(1, 0.3);
          ctx.globalAlpha = 0.55;
          ctx.strokeStyle = p.color + "bb"; ctx.lineWidth = p.r * 0.7;
          ctx.beginPath(); ctx.arc(0, 0, p.r * 1.9, 0, Math.PI*2); ctx.stroke();
          ctx.restore();
        }

        // подпись
        if (p.r >= 5) {
          ctx.globalAlpha = 0.35 * brightness;
          ctx.fillStyle = "#ffffff";
          ctx.font = "6px 'Courier New'";
          ctx.textAlign = "center";
          ctx.fillText(p.name, px, py + p.r + 9);
        }
      });

      ctx.globalAlpha = 1; ctx.restore();
    }

    function drawBonuses() {
      g.bonuses.forEach(b => {
        const pulse = Math.sin(b.pulse);
        const r = b.r + pulse*1.5;
        ctx.save(); ctx.translate(b.x, b.y);

        // внешнее свечение
        ctx.shadowColor="#00ff88"; ctx.shadowBlur=20+pulse*8;
        const outerGrad = ctx.createRadialGradient(0,0,r*0.5, 0,0,r*2);
        outerGrad.addColorStop(0,"rgba(0,255,136,0.15)");
        outerGrad.addColorStop(1,"transparent");
        ctx.fillStyle=outerGrad;
        ctx.beginPath(); ctx.arc(0,0,r*2,0,Math.PI*2); ctx.fill();

        // корпус капсулы
        const bodyGrad = ctx.createRadialGradient(-r*0.3,-r*0.3,0, 0,0,r);
        bodyGrad.addColorStop(0,"#aaffcc");
        bodyGrad.addColorStop(0.5,"#00cc66");
        bodyGrad.addColorStop(1,"#005533");
        ctx.fillStyle=bodyGrad;
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

        // крест — символ здоровья
        ctx.shadowBlur=0;
        ctx.strokeStyle="#ffffff";
        ctx.lineWidth=2.5;
        ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(0,-r*0.5); ctx.lineTo(0,r*0.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-r*0.5,0); ctx.lineTo(r*0.5,0); ctx.stroke();

        // блик
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.ellipse(-r*0.25,-r*0.28, r*0.28, r*0.18, -0.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
      });
      ctx.shadowBlur=0;
    }

    function drawCorona() {
      if (!g.corona) return;
      const {x, y, r, rays, flares, pulseT} = g.corona;
      ctx.save(); ctx.translate(x, y);
      const pulse = 1 + Math.sin(pulseT)*0.04;

      // дальнее свечение короны
      const outerGlow = ctx.createRadialGradient(0,0,r,0,0,r*3.5);
      outerGlow.addColorStop(0,"rgba(255,160,0,0.18)");
      outerGlow.addColorStop(0.4,"rgba(255,80,0,0.06)");
      outerGlow.addColorStop(1,"transparent");
      ctx.fillStyle=outerGlow; ctx.beginPath(); ctx.arc(0,0,r*3.5,0,Math.PI*2); ctx.fill();

      // жалящие лучи
      rays.forEach(ray => {
        const flicker = 0.7 + Math.sin(ray.phase)*0.3;
        const len = ray.len * flicker;
        ctx.save();
        ctx.rotate(ray.ang);
        const rayGrad = ctx.createLinearGradient(0,0,r+len,0);
        rayGrad.addColorStop(0,"rgba(255,220,80,0.95)");
        rayGrad.addColorStop(0.3,"rgba(255,140,0,0.6)");
        rayGrad.addColorStop(0.7,"rgba(255,80,0,0.2)");
        rayGrad.addColorStop(1,"transparent");
        ctx.strokeStyle=rayGrad;
        ctx.lineWidth=ray.width*flicker;
        ctx.lineCap="round";
        ctx.shadowColor="#ffaa00"; ctx.shadowBlur=12;
        ctx.beginPath(); ctx.moveTo(r*0.92,0); ctx.lineTo(r+len,0); ctx.stroke();
        // тонкое острие
        ctx.lineWidth=1.5; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.moveTo(r+len*0.6,0); ctx.lineTo(r+len*1.25,0); ctx.stroke();
        ctx.restore();
      });

      // солнечные вспышки (flares)
      flares.forEach(f => {
        ctx.save(); ctx.rotate(f.ang);
        ctx.globalAlpha = f.t;
        const fg = ctx.createLinearGradient(0,0,r+f.len,0);
        fg.addColorStop(0,"rgba(255,255,180,0.9)");
        fg.addColorStop(1,"transparent");
        ctx.strokeStyle=fg; ctx.lineWidth=f.width;
        ctx.lineCap="round"; ctx.shadowColor="#ffffff"; ctx.shadowBlur=20;
        ctx.beginPath(); ctx.moveTo(r*0.8,0); ctx.lineTo(r+f.len,0); ctx.stroke();
        ctx.restore();
      });
      ctx.globalAlpha=1;

      // тело Солнца
      const sunGrad = ctx.createRadialGradient(-r*0.15,-r*0.15,0,0,0,r*pulse);
      sunGrad.addColorStop(0,"#ffffff");
      sunGrad.addColorStop(0.15,"#fff5aa");
      sunGrad.addColorStop(0.5,"#ffaa00");
      sunGrad.addColorStop(0.8,"#ff6600");
      sunGrad.addColorStop(1,"#cc3300");
      ctx.shadowColor="#ffcc00"; ctx.shadowBlur=50;
      ctx.fillStyle=sunGrad;
      ctx.beginPath(); ctx.arc(0,0,r*pulse,0,Math.PI*2); ctx.fill();

      // поверхностные пятна
      ctx.shadowBlur=0;
      [[r*0.2, r*0.25, 8], [-r*0.3, -r*0.15, 12], [r*0.1, -r*0.35, 6]].forEach(([sx,sy,sr]) => {
        ctx.globalAlpha=0.25;
        ctx.fillStyle="#cc4400";
        ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }

    function drawTerra() {
      if (!g.terra) return;
      const {earth, moon, sun, clouds} = g.terra;

      // далёкое Солнце слева
      ctx.save(); ctx.translate(sun.x, sun.y);
      const sg = ctx.createRadialGradient(0,0,0,0,0,sun.r*2.5);
      sg.addColorStop(0,"#ffffff"); sg.addColorStop(0.3,"#fffaaa");
      sg.addColorStop(0.6,"rgba(255,200,0,0.3)"); sg.addColorStop(1,"transparent");
      ctx.shadowColor="#ffcc00"; ctx.shadowBlur=40;
      ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,sun.r*2.5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(0,0,sun.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.restore();

      // Луна (сзади Земли — рисуем первой если позади)
      const moonX = earth.x + Math.cos(moon.ang)*moon.orbitR;
      const moonY = earth.y + Math.sin(moon.ang)*moon.orbitR*0.35;
      const moonBehind = Math.sin(moon.ang) < 0;

      function drawMoon() {
        ctx.save(); ctx.translate(moonX, moonY);
        const mg = ctx.createRadialGradient(-moon.r*0.2,-moon.r*0.2,0,0,0,moon.r);
        mg.addColorStop(0,"#e8e0cc"); mg.addColorStop(0.6,"#b8a898"); mg.addColorStop(1,"#6a5a4a");
        ctx.shadowColor="#ffffff"; ctx.shadowBlur=15;
        ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(0,0,moon.r,0,Math.PI*2); ctx.fill();
        // кратеры
        [[0,0,5],[-moon.r*0.3,moon.r*0.2,3],[moon.r*0.25,-moon.r*0.3,4]].forEach(([cx,cy,cr])=>{
          ctx.shadowBlur=0; ctx.globalAlpha=0.3; ctx.fillStyle="#554433";
          ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
      }

      if (moonBehind) drawMoon();

      // орбита Луны (тонкая)
      ctx.save(); ctx.translate(earth.x, earth.y);
      ctx.globalAlpha=0.1; ctx.strokeStyle="#ffffff"; ctx.lineWidth=0.5;
      ctx.beginPath(); ctx.ellipse(0,0,moon.orbitR,moon.orbitR*0.35,0,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;

      // Земля
      ctx.rotate(earth.rot);
      // атмосфера
      const atmo = ctx.createRadialGradient(0,0,earth.r*0.92,0,0,earth.r*1.18);
      atmo.addColorStop(0,"rgba(80,140,255,0.5)");
      atmo.addColorStop(0.5,"rgba(60,100,200,0.15)");
      atmo.addColorStop(1,"transparent");
      ctx.fillStyle=atmo; ctx.beginPath(); ctx.arc(0,0,earth.r*1.18,0,Math.PI*2); ctx.fill();

      // тело Земли
      const eg = ctx.createRadialGradient(-earth.r*0.2,-earth.r*0.25,0,0,0,earth.r);
      eg.addColorStop(0,"#6ab4ff"); eg.addColorStop(0.3,"#2a6aaa");
      eg.addColorStop(0.65,"#1a4488"); eg.addColorStop(1,"#0a1a44");
      ctx.shadowColor="#3a7bd5"; ctx.shadowBlur=25;
      ctx.fillStyle=eg; ctx.beginPath(); ctx.arc(0,0,earth.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;

      // континенты (фиксированные пятна зелёного)
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,earth.r,0,Math.PI*2); ctx.clip();
      const landPatches = [
        [-earth.r*0.1, -earth.r*0.25, earth.r*0.35, earth.r*0.28],
        [ earth.r*0.3, -earth.r*0.1,  earth.r*0.22, earth.r*0.32],
        [-earth.r*0.35, earth.r*0.2,  earth.r*0.28, earth.r*0.22],
        [ earth.r*0.1,  earth.r*0.35, earth.r*0.2,  earth.r*0.18],
        [-earth.r*0.15,-earth.r*0.5,  earth.r*0.15, earth.r*0.12],
      ];
      ctx.globalAlpha=0.85;
      landPatches.forEach(([lx,ly,lw,lh])=>{
        const lg2=ctx.createRadialGradient(lx,ly,0,lx,ly,lw);
        lg2.addColorStop(0,"#4a8a3a"); lg2.addColorStop(0.5,"#2a6a2a"); lg2.addColorStop(1,"transparent");
        ctx.fillStyle=lg2; ctx.beginPath(); ctx.ellipse(lx,ly,lw,lh,Math.random()*0.5,0,Math.PI*2); ctx.fill();
      });
      // полярные шапки
      ctx.globalAlpha=0.7; ctx.fillStyle="#ddeeff";
      ctx.beginPath(); ctx.ellipse(0,-earth.r*0.82,earth.r*0.32,earth.r*0.18,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0,earth.r*0.85,earth.r*0.22,earth.r*0.12,0,0,Math.PI*2); ctx.fill();
      ctx.restore();

      // облака
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,earth.r,0,Math.PI*2); ctx.clip();
      clouds.forEach(cl=>{
        const cx2=Math.cos(cl.ang)*earth.r*(0.5+Math.abs(cl.lat)*0.4);
        const cy2=cl.lat*earth.r*0.9 + Math.sin(cl.ang)*earth.r*0.12;
        ctx.globalAlpha=0.45; ctx.fillStyle="#ffffff";
        ctx.beginPath(); ctx.ellipse(cx2,cy2,cl.size,cl.size*0.4,cl.ang*0.3,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();

      // блик солнечного света
      const shine=ctx.createRadialGradient(-earth.r*0.35,-earth.r*0.35,0,-earth.r*0.2,-earth.r*0.2,earth.r*0.75);
      shine.addColorStop(0,"rgba(255,255,255,0.22)"); shine.addColorStop(1,"transparent");
      ctx.globalAlpha=1; ctx.fillStyle=shine;
      ctx.save(); ctx.beginPath(); ctx.arc(0,0,earth.r,0,Math.PI*2); ctx.clip(); ctx.fillRect(-earth.r,-earth.r,earth.r*2,earth.r*2); ctx.restore();
      ctx.shadowBlur=0; ctx.restore();

      if (!moonBehind) drawMoon();
    }

    function drawEnemies() {
      g.enemies.forEach(e=>{
        ctx.save(); ctx.translate(e.x,e.y);
        glow("#ff4466",20); ctx.strokeStyle="#ff4466"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(-12,-8); ctx.lineTo(12,0); ctx.lineTo(-12,8); ctx.closePath(); ctx.stroke();
        ctx.fillStyle="#ff446622"; ctx.fill();
        // дуло
        ctx.strokeStyle="#ff8888"; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(16,0); ctx.stroke();
        noGlow(); ctx.restore();
      });
      // вражеские пули
      g.enemyBullets.forEach(b=>{
        ctx.save();
        glow(b.boss?"#ff8800":"#ff4466",12);
        ctx.fillStyle=b.boss?"#ff8800":"#ff6688";
        ctx.beginPath(); ctx.arc(b.x,b.y,b.boss?5:3,0,Math.PI*2); ctx.fill();
        noGlow(); ctx.restore();
      });
    }

    function drawBoss() {
      if (!g.boss) return;
      const {x,y,r,hp,maxHp,phase,enraged}=g.boss;
      ctx.save(); ctx.translate(x,y);
      const col=enraged?"#ff2244":"#cc1133";
      glow(col,enraged?35:20);
      // тело
      ctx.strokeStyle=col; ctx.lineWidth=2.5;
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=i/8*Math.PI*2+phase*0.3,pr=r*(i%2===0?1:0.65);ctx.lineTo(Math.cos(a)*pr,Math.sin(a)*pr);}
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle=col+"22"; ctx.fill();
      // ядро
      glow(enraged?"#ffaa00":"#ff6688",15);
      ctx.fillStyle=enraged?"#ffaa00":"#ff8888";
      ctx.beginPath(); ctx.arc(0,0,r*0.35,0,Math.PI*2); ctx.fill();
      noGlow();
      // HP-бар
      const bw=r*2.2, bh=5;
      ctx.fillStyle="#330011"; ctx.fillRect(-bw/2,-r-12,bw,bh);
      ctx.fillStyle=enraged?"#ff8800":"#ff2244";
      ctx.fillRect(-bw/2,-r-12,bw*(hp/maxHp),bh);
      ctx.strokeStyle="#ffffff44"; ctx.lineWidth=1; ctx.strokeRect(-bw/2,-r-12,bw,bh);
      ctx.restore();
    }

    function drawShieldPickups() {

        g2.addColorStop(0,"#88eeff"); g2.addColorStop(0.5,"#0088cc"); g2.addColorStop(1,"#003366");
        ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(0,0,p.r+pulse*1.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle="#ffffff"; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(0,-p.r*0.55); ctx.lineTo(0,p.r*0.55); ctx.stroke();
        ctx.beginPath(); ctx.arc(0,-p.r*0.2,p.r*0.38,Math.PI,0); ctx.stroke();

      });

    function drawShieldEffect() {

      ctx.strokeStyle="#00eaff"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,g.ship.r+10+Math.sin(g.frame*0.1)*3,0,Math.PI*2); ctx.stroke();

      ctx.fillStyle="#00eaff"; ctx.fill();
      ctx.globalAlpha=1; noGlow(); ctx.restore();

    function drawSignals() {
      g.signals.forEach(s=>{
        const alpha=Math.min(1,s.frames/40)*Math.min(1,(s.frames>40?1:s.frames/40));
        ctx.save();
        ctx.globalAlpha=alpha*0.8;
        ctx.fillStyle="#00ff88"; ctx.font="bold 8px 'Courier New'";

    function drawBanner() {
      if (!g.banner) return;
      const {text,color,frames}=g.banner;
      const alpha=Math.min(1,frames/30)*Math.min(1,(frames>30?1:frames/30));
      const yOff=frames>150?0:(150-frames)*0.3;
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.shadowColor=color; ctx.shadowBlur=20;
      ctx.fillStyle=color; ctx.font="bold 11px 'Courier New'";
      ctx.textAlign="center";
      ctx.fillText(text, W/2, 22+yOff);
      ctx.shadowBlur=0; ctx.restore();

    function drawSuperBar() {
      const bw=90, bh=5, bx=W/2-bw/2, by=H-9;
      ctx.fillStyle="#ffffff11"; ctx.fillRect(bx,by,bw,bh);
      if (g.superReady) {
        ctx.fillStyle="#ffff00";
        ctx.shadowColor="#ffff00"; ctx.shadowBlur=10;

    }

    function drawMagnetEffect() {
      if (g.magnetFrames<=0) return;
      ctx.save(); ctx.translate(g.ship.x,g.ship.y);
      ctx.globalAlpha=0.3*(g.magnetFrames/200);
      glow("#ff88ff",20);
      ctx.strokeStyle="#ff88ff"; ctx.lineWidth=1; ctx.setLineDash([3,5]);
      ctx.beginPath(); ctx.arc(0,0,80,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.globalAlpha=1; noGlow(); ctx.restore();
    }

    function drawLightnings() {
      g.lightnings.forEach(l=>{
        const {x1,y1,x2,y2,segs,life}=l;
        ctx.save();
        ctx.globalAlpha=life*0.85;
        ctx.strokeStyle=`rgba(180,160,255,${life})`;
        ctx.lineWidth=1.5;
        ctx.shadowColor="#aaaaff"; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.moveTo(x1,y1);
        // зигзаг
        for(let i=1;i<segs;i++){
          const t=i/segs;
          const mx=x1+(x2-x1)*t + (Math.random()-.5)*18;
          const my=y1+(y2-y1)*t + (Math.random()-.5)*18;
          ctx.lineTo(mx,my);
        }
        ctx.lineTo(x2,y2); ctx.stroke();
        ctx.shadowBlur=0; ctx.restore();
      });
    }

    function drawEyeNebula() {
      const {t, blink, pupilY}=g.eye;
      const ex=W*0.82, ey=H*0.18;
      const ew=55, eh=28;
      ctx.save(); ctx.translate(ex,ey);
      const blinkScale=blink>0.5?1-(blink-0.5)*2:1;

      // склера
      ctx.globalAlpha=0.22;
      const eyeGrad=ctx.createRadialGradient(0,0,0,0,0,ew*1.1);
      eyeGrad.addColorStop(0,"rgba(180,80,180,0.4)");
      eyeGrad.addColorStop(0.6,"rgba(80,0,100,0.2)");
      eyeGrad.addColorStop(1,"transparent");
      ctx.fillStyle=eyeGrad; ctx.beginPath(); ctx.ellipse(0,0,ew*1.3,eh*1.3,0,0,Math.PI*2); ctx.fill();

      ctx.scale(1,blinkScale);
      ctx.globalAlpha=0.35;
      // белок
      ctx.fillStyle="#ddbbff";
      ctx.beginPath(); ctx.ellipse(0,0,ew,eh,0,0,Math.PI*2); ctx.fill();

      // радужка
      const irisGrad=ctx.createRadialGradient(0,pupilY*0.6,0,0,pupilY*0.6,eh*0.75);
      irisGrad.addColorStop(0,"#220022"); irisGrad.addColorStop(0.4,"#6600aa");
      irisGrad.addColorStop(0.8,"#aa44ff"); irisGrad.addColorStop(1,"#440066");
      ctx.shadowColor="#aa44ff"; ctx.shadowBlur=12;
      ctx.fillStyle=irisGrad;
      ctx.beginPath(); ctx.ellipse(0,pupilY*0.6,eh*0.72,eh*0.72,0,0,Math.PI*2); ctx.fill();

      // зрачок
      ctx.fillStyle="#000011";
      ctx.shadowColor="#ffffff"; ctx.shadowBlur=5;
      ctx.beginPath(); ctx.ellipse(0,pupilY*0.7,eh*0.28,eh*0.28,0,0,Math.PI*2); ctx.fill();

      // блик
      ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.shadowBlur=0;
      ctx.beginPath(); ctx.ellipse(-eh*0.2,pupilY*0.5-eh*0.15,eh*0.12,eh*0.07,-0.5,0,Math.PI*2); ctx.fill();

      // веки при моргании
      if(blink>0){
        ctx.fillStyle="#050010"; ctx.shadowBlur=0; ctx.globalAlpha=Math.min(1,blink*2);
        ctx.beginPath(); ctx.ellipse(0,0,ew,eh,0,0,Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }

    function drawMagnetPickups() {
      g.magnetPickups.forEach(p=>{
        const pulse=Math.sin(p.pulse||0)*1.5;
        ctx.save(); ctx.translate(p.x,p.y);
        glow("#ff88ff",16+pulse);
        const mg=ctx.createRadialGradient(-p.r*0.2,-p.r*0.2,0,0,0,p.r);
        mg.addColorStop(0,"#ffccff"); mg.addColorStop(0.5,"#cc44cc"); mg.addColorStop(1,"#440044");
        ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(0,0,p.r+pulse*0.5,0,Math.PI*2); ctx.fill();
        // символ магнита — дуга
        ctx.strokeStyle="#ffffff"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.arc(0,1,p.r*0.38,Math.PI,0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-p.r*0.38,1); ctx.lineTo(-p.r*0.38,p.r*0.35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo( p.r*0.38,1); ctx.lineTo( p.r*0.38,p.r*0.35); ctx.stroke();
        // полюса
        ctx.fillStyle="#ff4444"; ctx.beginPath(); ctx.arc(-p.r*0.38,p.r*0.35,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4444ff"; ctx.beginPath(); ctx.arc( p.r*0.38,p.r*0.35,3,0,Math.PI*2); ctx.fill();
        noGlow(); ctx.restore();
      });
    }

    function drawBlackHole() {
      if (!g.hole) return;
      const {x,y,r,rot,pulseT,entering} = g.hole;
      ctx.save(); ctx.translate(x,y);
      // accretion disk
      for (let i=3;i>=0;i--) {
        const dr = r*(1.2+i*0.55);
        ctx.save(); ctx.rotate(rot*(1+i*0.3));
        ctx.scale(1,0.32);
        const ag = ctx.createRadialGradient(0,0,r*0.9,0,0,dr);
        ag.addColorStop(0,i===0?"rgba(255,140,0,0.9)":"rgba(255,200,0,0.5)");
        ag.addColorStop(0.5,i===0?"rgba(255,60,0,0.4)":"rgba(200,100,0,0.2)");
        ag.addColorStop(1,"transparent");
        ctx.fillStyle=ag;
        ctx.beginPath(); ctx.arc(0,0,dr,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
      // dark center
      const pulse = 1+Math.sin(pulseT)*0.06;
      const dg = ctx.createRadialGradient(0,0,0,0,0,r*pulse);
      dg.addColorStop(0,"rgba(0,0,0,1)");
      dg.addColorStop(0.7,"rgba(0,0,0,0.97)");
      dg.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(0,0,r*pulse*1.1,0,Math.PI*2); ctx.fill();
      // lensing ring — ярче когда выровнено с кораблём
      const aligned = Math.abs(g.ship.x - x) < r*1.8;
      ctx.strokeStyle = entering?"rgba(255,255,255,0.95)": aligned?"rgba(255,240,80,0.9)":"rgba(255,200,100,0.55)";
      ctx.lineWidth = entering?3: aligned?2.5:1.5;
      glow(entering?"#ffffff": aligned?"#ffff44":"#ffcc44", entering?35: aligned?28:16);
      ctx.beginPath(); ctx.arc(0,0,r*pulse,0,Math.PI*2); ctx.stroke();
      noGlow();
      // label
      if (!entering) {
        ctx.globalAlpha=0.5+Math.sin(pulseT*2)*0.3;
        ctx.fillStyle="#ffcc44"; ctx.font="bold 7px 'Courier New'";
        ctx.textAlign="center"; ctx.fillText("EVENT HORIZON",0,r+16);
        ctx.fillText("+100 PTS",0,r+26);
      }
      ctx.globalAlpha=1; ctx.restore();
    }

    function drawComets() {
      g.comets.forEach(c=>{
        // хвост — без glow, просто точки
        c.tail.forEach((pt,i)=>{
          const alpha=(1-i/c.tail.length)*0.55;
          const r2=c.r*(1-i/c.tail.length)*0.8;
          if(r2<0.2)return;
          ctx.globalAlpha=alpha;
          ctx.fillStyle=c.color;
          ctx.beginPath(); ctx.arc(pt.x,pt.y,r2,0,Math.PI*2); ctx.fill();
        });
        // голова — с glow
        ctx.globalAlpha=1;
        glow(c.color,16);
        ctx.fillStyle="#ffffff";
        ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
        noGlow();
      });
      ctx.globalAlpha=1;
    }

    function drawZoneFlash() {
      if (g.transitFrames<=0) return;
      const alpha = g.transitFrames/60;
      const zone = ZONES[g.zone||0];
      ctx.fillStyle=`rgba(200,220,255,${alpha*0.85})`;
      ctx.fillRect(0,0,W,H);
      // zone name
      if (g.transitFrames>20) {
        ctx.globalAlpha=(g.transitFrames-20)/40;
        ctx.fillStyle="#ffffff";
        ctx.font=`bold 14px 'Courier New'`;
        ctx.textAlign="center";
        ctx.shadowColor="#00eaff"; ctx.shadowBlur=20;
        ctx.fillText(zone.name, W/2, H/2-8);
        ctx.font="9px 'Courier New'";
        ctx.fillText("+100 BONUS", W/2, H/2+10);
        ctx.shadowBlur=0;
      }
      ctx.globalAlpha=1;
    }

    function drawPlanet(p){
      const {x,y,r,type,alpha}=p;
      ctx.save();ctx.globalAlpha=alpha;
      if(type.blur>0)ctx.filter=`blur(${type.blur}px)`;
      const h=ctx.createRadialGradient(x,y,r*.7,x,y,r*1.55);h.addColorStop(0,type.atmo);h.addColorStop(1,"transparent");
      ctx.fillStyle=h;ctx.beginPath();ctx.arc(x,y,r*1.55,0,Math.PI*2);ctx.fill();
      const bg=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
      bg.addColorStop(0,lighten(type.color,40));bg.addColorStop(.5,type.color);bg.addColorStop(1,darken(type.color,50));
      ctx.fillStyle=bg;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
      if(type.bands.length){
        ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
        type.bands.forEach((bc,i)=>{const by=y-r*.6+i*r*.55,g2=ctx.createLinearGradient(x-r,by,x+r,by);g2.addColorStop(0,"transparent");g2.addColorStop(.3,bc);g2.addColorStop(.7,bc);g2.addColorStop(1,"transparent");ctx.fillStyle=g2;ctx.fillRect(x-r,by,r*2,r*.22);});
        ctx.restore();
      }
      ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
      const sh=ctx.createRadialGradient(x-r*.38,y-r*.38,0,x-r*.2,y-r*.2,r*.7);sh.addColorStop(0,"rgba(255,255,255,0.18)");sh.addColorStop(1,"transparent");
      ctx.fillStyle=sh;ctx.fillRect(x-r,y-r,r*2,r*2);ctx.restore();
      if(type.hasRing){
        ctx.filter="none";ctx.globalAlpha=alpha*.55;
        ctx.save();ctx.translate(x,y);ctx.scale(1,.28);
        for(let i=0;i<5;i++){const rr=r*1.22+(r*.63)*(i/4);ctx.globalAlpha=alpha*(.2+i*.08);ctx.lineWidth=r*.13;ctx.strokeStyle=type.color+"99";glow(type.color,8);ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();}
        noGlow();ctx.restore();
      }
      ctx.filter="none";ctx.globalAlpha=1;ctx.restore();
    }

    function drawPlanets(){[...g.planets].sort((a,b)=>b.r-a.r).forEach(drawPlanet);}

    function drawStars(){g.stars.forEach(s=>{ctx.globalAlpha=.3+s.a*.5;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

    function drawWarpStars(){
      if(g.warpSpeed<.05)return;
      g.stars.forEach(s=>{const st=g.warpSpeed*25;if(st<2)return;ctx.save();ctx.globalAlpha=(.3+s.a*.5)*Math.min(1,g.warpSpeed*1.5);const grd=ctx.createLinearGradient(s.x,s.y,s.x+st,s.y);grd.addColorStop(0,"transparent");grd.addColorStop(1,"#ffffff");ctx.strokeStyle=grd;ctx.lineWidth=s.r;ctx.beginPath();ctx.moveTo(s.x+st,s.y);ctx.lineTo(s.x,s.y);ctx.stroke();ctx.restore();});
      ctx.globalAlpha=1;
    }

    function drawWarpStreams(){
      if(g.warpStreams.length===0&&g.warpSpeed<.05)return;
      if(g.warpSpeed>.1){const va=g.warpSpeed*.18,vg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);vg.addColorStop(0,"rgba(0,234,255,0)");vg.addColorStop(.6,"rgba(0,234,255,0)");vg.addColorStop(1,`rgba(0,234,255,${va})`);ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);if(g.warpSpeed>.5){ctx.fillStyle=`rgba(200,240,255,${(g.warpSpeed-.5)*.25})`;ctx.fillRect(0,0,W,H);}}
      g.warpStreams.forEach(s=>{ctx.save();ctx.globalAlpha=s.alpha*Math.min(1,g.warpSpeed*2);const grd=ctx.createLinearGradient(s.x,s.y,s.x+s.len,s.y);grd.addColorStop(0,"transparent");grd.addColorStop(.4,s.color);grd.addColorStop(1,s.color+"cc");ctx.strokeStyle=grd;ctx.lineWidth=1.2;glow(s.color,6);ctx.beginPath();ctx.moveTo(s.x+s.len,s.y);ctx.lineTo(s.x,s.y);ctx.stroke();noGlow();ctx.restore();});
      ctx.globalAlpha=1;
    }

    function drawShip(){
      if(g.state==="dead")return;

            </button>
            {ui.state==="idle"&&<div style={{color:"#ffffff22",fontSize:"8px",letterSpacing:"2px"}}>W/S - move | Z/X - fire</div>}
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:"40px",marginTop:"22px",alignItems:"center"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
          <div style={{color:"#00eaff33",fontSize:"8px",letterSpacing:"2px"}}>MOVE</div>
          <div onMouseDown={onJoyStart} onMouseMove={onJoyMove} onMouseUp={onJoyEnd} onMouseLeave={onJoyEnd}
            onTouchStart={onJoyStart} onTouchMove={onJoyMove} onTouchEnd={onJoyEnd}
            style={{width:"72px",height:"72px",borderRadius:"50%",background:"#ffffff08",border:"2px solid #00eaff33",boxShadow:"0 0 20px #00eaff22",position:"relative",cursor:"pointer",touchAction:"none"}}>
            <div style={{position:"absolute",left:"50%",top:"12px",bottom:"12px",width:"1px",background:"#00eaff22",transform:"translateX(-50%)"}}/>
            <div style={{position:"absolute",left:"50%",top:"50%",width:"28px",height:"28px",borderRadius:"50%",background:"radial-gradient(circle at 40% 35%, #00eaff88, #00eaff22)",border:"1.5px solid #00eaff99",boxShadow:"0 0 14px #00eaff88",transform:`translate(-50%, calc(-50% + ${knobY}px))`,transition:joystick.active?"none":"transform 0.25s",pointerEvents:"none"}}/>
          </div>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
          <div style={{color:"#ffe56633",fontSize:"8px",letterSpacing:"2px"}}>FIRE</div>
          <button onMouseDown={e=>{e.preventDefault();gameRef.current?.shoot?.();}} onTouchStart={e=>{e.preventDefault();gameRef.current?.shoot?.();}}
            style={{width:"72px",height:"72px",borderRadius:"50%",background:"transparent",border:"2px solid #ffe56666",color:"#ffe566",fontSize:"26px",cursor:"pointer",boxShadow:"0 0 20px #ffe56633",WebkitTapHighlightColor:"transparent",fontFamily:"sans-serif"}}>
            *
          </button>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px"}}>
          <div style={{color:ui.superReady?"#ffff0099":"#ffffff22",fontSize:"8px",letterSpacing:"2px"}}>SUPER</div>
          <button onMouseDown={e=>{e.preventDefault();gameRef.current?.fireSuperShot?.();}} onTouchStart={e=>{e.preventDefault();gameRef.current?.fireSuperShot?.();}}
            style={{width:"72px",height:"72px",borderRadius:"50%",background:"transparent",
              border:`2px solid ${ui.superReady?"#ffff0099":"#ffffff22"}`,
              color:ui.superReady?"#ffff00":"#ffffff33",fontSize:"22px",cursor:"pointer",
              boxShadow:ui.superReady?"0 0 25px #ffff0066":"none",
              WebkitTapHighlightColor:"transparent",fontFamily:"sans-serif",
              animation:ui.superReady?"gb 0.8s ease-in-out infinite":"none"}}>
            ⚡
          </button>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",marginTop:"14px"}}>
        <div style={{color:ready?"#ffe56699":"#ffffff33",fontSize:"8px",letterSpacing:"2px"}}>
          {ready?"WARP READY":`WARP ${Math.ceil(ui.warpCooldown/60)}s`}
        </div>
        <div style={{position:"relative",width:"80px",height:"80px"}}
          onMouseDown={e=>{e.preventDefault();gameRef.current?.activateWarp?.();}}
          onTouchStart={e=>{e.preventDefault();gameRef.current?.activateWarp?.();}}>
          <svg width="80" height="80" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
            <circle cx="40" cy="40" r={radius} fill="none" stroke="#ffffff11" strokeWidth="3"/>
            <circle cx="40" cy="40" r={radius} fill="none" stroke={ready?"#ffe566":"#00eaff88"} strokeWidth="3"
              strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} style={{transition:"stroke-dashoffset 0.1s,stroke 0.3s"}}/>
          </svg>
          <button style={{position:"absolute",inset:"6px",borderRadius:"50%",background:ready?"radial-gradient(circle at 40% 35%, #ffe56644, #ffe56611)":"#ffffff08",border:`2px solid ${ready?"#ffe566aa":"#ffffff22"}`,color:ready?"#ffe566":"#ffffff44",fontSize:"20px",cursor:ready?"pointer":"default",boxShadow:ready?"0 0 25px #ffe56666":"none",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",animation:ready?"gb 1.5s ease-in-out infinite":"none",fontFamily:"sans-serif"}}>
            W
          </button>
        </div>
      </div>
    </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<SpaceRunner />);
</script>
</body>
</html>
